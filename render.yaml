services:
  - type: web
    name: smart-study-planner
    env: python
    plan: free
    rootDir: smartStudyPlanner
    buildCommand: pip install -r smartStudyPlanner/requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
