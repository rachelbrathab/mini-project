<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Serenra</title>
    <meta name="theme-color" content="#213537">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/serenra-icon.png">
    <link rel="apple-touch-icon" href="/static/serenra-icon.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar">
    <a href="/input" class="brand-lockup" aria-label="Serenra home">
        <img src="/static/serenra-logo.png" alt="Serenra logo" class="sidebar-logo" onerror="this.style.display='none'">
        <span>SERENRA</span>
    </a>

    <a href="/input">🏠 Input</a>
    <a href="/schedule">📅 Schedule</a>
    <a href="/progress">📊 Progress</a>
    <a href="/history">📁 History</a>
    <a href="/analytics">📈 Analytics</a>
    <a href="/accountability">🤝 Accountability</a>
    <a href="/extension-setup">🛠️ Extension Setup</a>
    <a href="/download-extension">🧩 Download Extension</a>

    <div class="user-box">
        👤 {{ session.get('user') }}
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<script>
if (localStorage.getItem('isAuthenticated') !== 'true') {
    window.location.href = '/login';
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
}
</script>

</body>
</html>
